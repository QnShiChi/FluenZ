# Override main application.yml for tests
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm-min-32chars!!
  access-expiration: 3600000
  refresh-expiration: 86400000

app:
  base-url: http://localhost:8080
  upload:
    dir: /tmp/fluenz-test-uploads

openrouter:
  api-key: test-key
  model: test-model
  base-url: https://test.example.com

unsplash:
  access:
    key: test-key
