spring:
  application:
    name: fluenz-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fluenz_db}
    username: ${SPRING_DATASOURCE_USERNAME:fluenz_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fluenz_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

# ---------- JWT ----------
jwt:
  secret: ${JWT_SECRET:fluenz-default-secret-key-change-in-production-min-32-chars!!}
  access-expiration: ${JWT_ACCESS_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# ---------- OpenRouter (LLM) ----------
openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  model: ${OPENROUTER_MODEL:google/gemini-2.0-flash-001}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
